<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RE-대한공예협회</title>

    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>

    <!-- fontawesome -->
    <script
      src="https://kit.fontawesome.com/ef7bb4d34a.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <!-- 이벤트 바 -->
    <div class="top-banner">
      <a href="#" class="top-ad-banner">
        <img src="./assets/images/banner.jpg" alt="2026년 설맞이 이벤트 배너" />
      </a>

      <div class="banner-controls">
        <button class="detail-btn">
          공고 내용 자세히 보기
          <span><i class="fa-solid fa-arrow-down"></i></span>
        </button>
        <label class="today-close">
          오늘은 그만보기
          <input type="checkbox" id="hideToday" />
        </label>
      </div>
    </div>

    <!-- header section -->
    <section class="hero-section">
      <!-- 배경 슬라이드1 -->
      <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="./assets/images/1.jpg" alt="십자수 이미지" />
          </div>
          <div class="swiper-slide">
            <img src="./assets/images/2.jpg" alt="조개아트 이미지" />
          </div>
          <div class="swiper-slide">
            <img src="./assets/images/3.jpg" alt="뜨개실 이미지" />
          </div>
          <div class="swiper-slide">
            <img src="./assets/images/4.jpg" alt="실 인형 공예 이미지" />
          </div>
        </div>
        <div class="swiper-pagination"></div>
      </div>

      <header class="hero-wrap">
        <div class="container">
          <div class="header-content">
            <!-- logo -->
            <div class="logo">
              <a href="index.html">
                <img
                  src="./assets/images/header-logo.png"
                  alt="대한공예협회 로고"
                />
              </a>
            </div>

            <!-- nav -->
            <div class="nav-bar">
              <nav>
                <ul class="menu-list">
                  <li><a href="#">협회 소개</a></li>
                  <li><a href="#">자격증 안내</a></li>
                  <li><a href="#">교육 · 수강</a></li>
                  <li><a href="#">문의하기</a></li>
                  <li><a href="#">커뮤니티</a></li>
                </ul>
              </nav>

              <div class="nav-right">
                <div class="search">
                  <input type="text" placeholder="" />
                  <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </button>
                </div>
                <div class="language">
                  <button type="button" id="langBtn">
                    <span id="langText">KR</span>
                    <i class="fa-solid fa-globe"></i>
                  </button>

                  <!-- 드롭다운 메뉴 -->
                  <ul class="lang-menu">
                    <li data-lang="KR">KR</li>
                    <li data-lang="EN">EN</li>
                  </ul>
                </div>
                <div class="login-box">
                  <a href="#" class="login-box">로그인</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- hero section -->
      <div class="hero-content-container">
        <!-- left -->
        <div class="hero-title">
          <h1>
            <span class="hero-title-line1">" 손끝에서 만들어지는</span><br />
            <span class="hero-title-line2">행복한 공예세상 "</span>
          </h1>

          <p class="hero-subtitle">
            1999년 부터 전국 100만 회원과 함께 이어온 대한민국 대표 공예 사단
            법인
          </p>
        </div>

        <!-- 통합 검색 -->
        <div class="search-container">
          <div class="search-title">
            <span class="s-title">통합검색</span>
            <div class="hashtags-box">
              <span class="s-sub-title">#추천 검색어</span>
              <ul class="hashtags">
                <li>#온라인 강의</li>
                <li>#자격증 시험접수</li>
                <li>#시험 결과발표</li>
                <li>#뜨개질</li>
              </ul>
            </div>
          </div>

          <div class="search-box">
            <input type="text" placeholder="검색어를 입력해 주세요." />
            <button>
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- right -->
        <div class="hero-right">
          <div class="swiper hero-right-swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <img src="./assets/images/1-1.jpg" alt="십자수 이미지" />
              </div>
              <div class="swiper-slide">
                <img src="./assets/images/2-1.jpg" alt="조개아트 이미지" />
              </div>
              <div class="swiper-slide">
                <img src="./assets/images/3-1.jpg" alt="뜨개실 이미지" />
              </div>
              <div class="swiper-slide">
                <img src="./assets/images/4-1.jpg" alt="실 인형 공예 이미지" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- main section -->

    <!-- footer section -->
    <footer></footer>
  </body>
</html>
